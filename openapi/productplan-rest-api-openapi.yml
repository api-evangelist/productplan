        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    post:
      operationId: createRoadmapLane
      summary: Create a lane in a roadmap
      tags:
        - Roadmaps
      parameters:
        - name: roadmap_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LaneCreate'
      responses:
        '201':
