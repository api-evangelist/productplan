openapi: 3.0.3
info:
  title: ProductPlan REST API
  description: >
    The ProductPlan REST API (v2) provides programmatic access to roadmaps,
    strategy (objectives and key results), discovery (ideas and opportunities),
    launch management, users, teams, and account status. It enables
    synchronization with internal systems and third-party tools such as Jira,
    GitHub, Slack, and Trello.
  version: v2
  contact:
    name: ProductPlan Support
    url: https://docs.productplan.com/api/
  termsOfService: https://www.productplan.com/terms/
servers:
  - url: https://app.productplan.com/api/v2
    description: ProductPlan production API
security:
  - bearerAuth: []
tags:
  - name: Roadmaps
    description: Manage roadmaps, lanes, milestones, bars, and comments
  - name: Bars
    description: Manage bars (features/items) within roadmaps
  - name: Strategy
    description: Manage OKR objectives and key results
  - name: Discovery
    description: Manage ideas, opportunities, customers, and idea forms
  - name: Launches
    description: Manage launches, checklist sections, and tasks
  - name: Users
    description: List account users
  - name: Teams
    description: List teams
  - name: Status
    description: Application status
paths:
  /roadmaps:
    get:
      operationId: listRoadmaps
      summary: List roadmaps
      description: Returns a paginated list of roadmaps for the authenticated account.
      tags:
        - Roadmaps
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/q'
      responses:
        '200':
          description: A paginated list of roadmaps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /roadmaps/{id}:
    get:
      operationId: getRoadmap
      summary: Retrieve a roadmap
      tags:
        - Roadmaps
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: A single roadmap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadmapResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /roadmaps/{roadmap_id}/lanes:
